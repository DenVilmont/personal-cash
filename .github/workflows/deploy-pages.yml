name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore workloads
        run: dotnet workload restore

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish ./PersonalCash.csproj -c Release -o ./artifacts/publish -p:BaseHref=/${{ github.event.repository.name }}/
        
      - name: Inject Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          path = "./artifacts/publish/wwwroot/appsettings.json"
          with open(path, "r", encoding="utf-8") as f:
            data = json.load(f)

          data["Supabase"]["Url"] = os.environ["SUPABASE_URL"]
          data["Supabase"]["Key"] = os.environ["SUPABASE_ANON_KEY"]

          with open(path, "w", encoding="utf-8") as f:
            json.dump(data, f, ensure_ascii=False, indent=2)
          PY
        
      - name: Rewrite base href
        uses: SteveSandersonMS/ghaction-rewrite-base-href@5b54862a8831e012d4f1a8b2660894415fdde8ec # v1.1.0
        with:
          html_path: ./artifacts/publish/wwwroot/index.html
          base_href: /${{ github.event.repository.name }}/
          
      - name: Add .nojekyll
        run: touch ./artifacts/publish/wwwroot/.nojekyll

      - name: Add 404 fallback
        run: cp ./artifacts/publish/wwwroot/index.html ./artifacts/publish/wwwroot/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifacts/publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4